<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Monitor</title>
    <!-- Add some basic Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* General body styling */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Main container */
        .container {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        /* Heading */
        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        /* Label and status text */
        .status-label, .door-label {
            font-size: 1.2em;
            color: #333;
            font-weight: 600;
            margin: 10px 0;
        }

        .status {
            font-size: 1.5em;
            margin: 20px 0;
            font-weight: bold;
        }

        .door-state {
            font-size: 2em;
            color: #d9534f;
            margin-bottom: 30px;
        }

        .status.ON {
            color: #5bc0de;
        }

        .status.OFF {
            color: #f0ad4e;
        }

        .door-state.OPEN {
            color: #d9534f; /* Red for open door */
        }

        .door-state.CLOSED {
            color: #5bc0de; /* Green for closed door */
        }

        /* Button styling */
        button {
            background-color: #5bc0de;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            margin: 10px 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #31b0d5;
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .container {
                width: 100%;
                padding: 15px;
            }

            .status, .door-state {
                font-size: 1.2em;
            }

            button {
                width: 100%;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Door Monitor</h1>

        <!-- Alarm Status with Label -->
        <div class="status-label">
            <strong>Alarm Status:</strong>
        </div>
        <p class="status {{ status }}">{{ status }}</p>

        <!-- Door State with Label -->
        <div class="door-label">
            <strong>Door Status:</strong>
        </div>
        <p class="door-state {{ door_state }}">{{ door_state }}</p>

        <!-- Buttons for starting and stopping the alarm -->
        <button onclick="location.href='{{ url_for('start_alarm') }}'">Start Alarm</button>
        <button onclick="location.href='{{ url_for('stop_alarm') }}'">Stop Alarm</button>
    </div>

    <!-- Add some AJAX to dynamically update door state every second -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Function to fetch the door state every 1 second using AJAX
        function updateDoorState() {
            $.get("/door_state", function(data) {
                $(".door-state").text(data.door_state);
                $(".door-state").removeClass("OPEN CLOSED");
                $(".door-state").addClass(data.door_state);
            });
        }

        // Update the door state dynamically every 1 second
        setInterval(updateDoorState, 1000);
    </script>
</body>
</html>
